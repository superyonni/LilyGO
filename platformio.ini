[platformio]
default_envs = lilygo-t-echo

[env:lilygo-t-echo]
platform = nordicnrf52@10.9.0
board = nrf52840_dk_adafruit
framework = arduino
monitor_speed = 115200
; Monitor en modo aplicacion (COM8). Upload: autodetect + touch 1200 -> bootloader (COM9)
monitor_port = COM8
upload_protocol = nrfutil
; Touch 1200 baud: app COM8 -> bootloader COM9 (VID 239A:8029 -> 239A:002A)
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
build_flags =
    -DCFG_DEBUG=0
    -DARDUINO_NRF52_ADAFRUIT
    -Iinclude
    -DJOIN_ONLY_TEST=1
lib_deps =
    jgromes/RadioLib@7.0.2
    zinggjm/GxEPD2@^1.6.2
    mikalhart/TinyGPSPlus@^1.0.3
    lewisxhe/PCF8563_Library@^1.0.1
